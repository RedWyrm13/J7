
# ── Full sweep: 4 to 20 qubits ──────────────────────────────────────────────
qubit_range: [4, 21]          # range(4, 21) → qubits 4..20 inclusive
labels: ['iqp', 'clifford', 'clifford_t']

# shots = shots_base * n_qubits^2  (quadratic scaling)
# n=4  →  256 shots
# n=10 → 1600 shots
# n=20 → 6400 shots
shots_base: 16

n_ops: 1000
n_circuits: 1000
resamples_per_circuit: 1
master_seed: 42

# ── Measurement modes ────────────────────────────────────────────────────────
# z_only:      computational basis only, ZZ all-pairs  → data/quantum/
# multi_basis: Z + X + Y global bases (shots/3 each),  → data/quantum_mb/
#              gives ZZ + XX + YY all-pairs
# shadows:     random per-qubit basis each shot,        → data/quantum_shadows/
#              gives all 6 Pauli pair correlators
measurement_modes: ['z_only', 'multi_basis', 'shadows']

